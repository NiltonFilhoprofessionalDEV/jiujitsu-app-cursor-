name: Cron Auto Sessions

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-auto-sessions:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-sessions cron route
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_BASE_URL or CRON_SECRET repository secret."
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/api/cron/auto-sessions"
